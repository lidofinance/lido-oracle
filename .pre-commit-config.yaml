repos:
  - repo: local
    hooks:
      - id: ruff-format-tests
        name: Run Ruff format on tests/ using Poetry
        entry: poetry run ruff format tests
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: conventional-pre-commit
        name: Conventional pre-commit
        entry: poetry run conventional-pre-commit
        language: system
        stages: [commit-msg]
      - id: ruff-check-imports
        name: ruff check imports
        entry: poetry run ruff check --select I --fix
        language: system
        types: [python]
        stages: [pre-commit]
      - id: pyright
        name: pyright
        entry: poetry run pyright
        language: system
        types: [python]
        files: '^(src)/'
        stages: [commit]
      - id: ruff
        name: ruff check
        entry: poetry run ruff check src tests
        language: system
        types: [python]
        files: '^(src|test)/'
        stages: [commit]
      - id: pytest-unit
        name: Run pytest unit tests
        entry: poetry run pytest tests -m "unit"
        language: system
        pass_filenames: false
        stages: [commit]
