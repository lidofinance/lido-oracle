---
services:
  ipfs:
    build: .
    container_name: lido-oracle-kubo
    restart: unless-stopped
    volumes:
      - ipfs_data:/data/ipfs
    ports:
      - "127.0.0.1:5001:5001"
    command:
      - daemon
      - --migrate=true
      - --agent-version-suffix=docker
    environment:
      CHAIN: artifact

volumes:
  ipfs_data:
